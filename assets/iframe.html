<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #2f3941;
      padding: 12px;
      background: #fff;
    }

    /* ── Form controls ─────────────────────────────────── */

    .ots-field {
      margin-bottom: 12px;
    }

    .ots-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #68737d;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .ots-textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px 10px;
      border: 1px solid #d8dcde;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      color: #2f3941;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .ots-textarea:focus {
      outline: none;
      border-color: #1f73b7;
      box-shadow: 0 0 0 3px rgba(31, 115, 183, 0.15);
    }

    .ots-input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d8dcde;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      color: #2f3941;
      transition: border-color 0.15s;
    }
    .ots-input:focus {
      outline: none;
      border-color: #1f73b7;
      box-shadow: 0 0 0 3px rgba(31, 115, 183, 0.15);
    }

    .ots-select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d8dcde;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      color: #2f3941;
      background: #fff;
      cursor: pointer;
    }
    .ots-select:focus {
      outline: none;
      border-color: #1f73b7;
    }

    /* ── Buttons ────────────────────────────────────────── */

    .ots-btn {
      display: block;
      width: 100%;
      padding: 9px 16px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, opacity 0.15s;
    }
    .ots-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ots-btn-primary {
      background: #dc4a22;
      color: #fff;
    }
    .ots-btn-primary:hover:not(:disabled) {
      background: #c43d1a;
    }

    .ots-btn-secondary {
      background: #f8f9f9;
      color: #2f3941;
      border: 1px solid #d8dcde;
    }
    .ots-btn-secondary:hover:not(:disabled) {
      background: #e9ebed;
    }

    .ots-btn + .ots-btn {
      margin-top: 8px;
    }

    /* ── Result panel ──────────────────────────────────── */

    .ots-result {
      display: none;
    }

    .ots-result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ots-check-icon {
      width: 20px;
      height: 20px;
      background: #038153;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ots-check-icon svg {
      width: 12px;
      height: 12px;
      fill: #fff;
    }

    .ots-result-title {
      font-size: 14px;
      font-weight: 600;
      color: #038153;
    }

    .ots-link-display {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d8dcde;
      border-radius: 4px;
      font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Mono", monospace;
      font-size: 11px;
      color: #2f3941;
      background: #f8f9f9;
      word-break: break-all;
      margin-bottom: 12px;
    }

    .ots-passphrase-note {
      font-size: 12px;
      color: #87929d;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #fff8f0;
      border: 1px solid #ffd073;
      border-radius: 4px;
    }

    /* ── Error state ───────────────────────────────────── */

    .ots-error {
      display: none;
      padding: 10px 12px;
      background: #fff0f1;
      border: 1px solid #e35b66;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .ots-error-title {
      font-size: 12px;
      font-weight: 600;
      color: #cc3340;
      margin-bottom: 4px;
    }

    .ots-error-message {
      font-size: 12px;
      color: #681219;
    }

    /* ── Loading spinner ───────────────────────────────── */

    .ots-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: ots-spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes ots-spin {
      to { transform: rotate(360deg); }
    }

    /* ── Branding ──────────────────────────────────────── */

    .ots-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid #e9ebed;
    }

    .ots-brand-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .ots-brand-text {
      font-size: 14px;
      font-weight: 600;
      color: #2f3941;
    }

    .ots-brand-region {
      font-size: 11px;
      color: #87929d;
      font-weight: 400;
      margin-left: auto;
      text-transform: uppercase;
    }

    /* ── Utility ───────────────────────────────────────── */

    .hidden { display: none !important; }
  </style>
</head>

    <span class="ots-brand-text">Onetime Secret</span>
    <span class="ots-brand-region" id="regionBadge"></span>
  </div>

  <!-- ── Error display ─────────────────────────────────── -->
  <div class="ots-error" id="errorPanel">
    <div class="ots-error-title" id="errorTitle"></div>
    <div class="ots-error-message" id="errorMessage"></div>
  </div>

  <!-- ── Form view ─────────────────────────────────────── -->
  <div id="formView">
    <div class="ots-field">
      <label class="ots-label" for="secretInput">Secret content</label>
      <textarea class="ots-textarea" id="secretInput" placeholder="Paste sensitive content here..." rows="4"></textarea>
    </div>

    <div class="ots-field">
      <label class="ots-label" for="passphraseInput">Passphrase (optional)</label>
      <input class="ots-input" type="text" id="passphraseInput" placeholder="Require a passphrase to view" autocomplete="off">
    </div>

    <div class="ots-field">
      <label class="ots-label" for="ttlSelect">Expires after</label>
      <select class="ots-select" id="ttlSelect">
        <option value="300">5 minutes</option>
        <option value="3600">1 hour</option>
        <option value="86400">1 day</option>
        <option value="259200">3 days</option>
        <option value="604800" selected>7 days</option>
        <option value="1209600">14 days</option>
        <option value="2592000">30 days</option>
      </select>
    </div>

    <button class="ots-btn ots-btn-primary" id="generateBtn">Generate Link</button>
  </div>

  <!-- ── Result view ───────────────────────────────────── -->
  <div class="ots-result" id="resultView">
    <div class="ots-result-header">
      <div class="ots-check-icon">
        <svg viewBox="0 0 16 16"><path d="M6.5 12.5l-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4z"/></svg>
      </div>
      <span class="ots-result-title">Secret link ready</span>
    </div>

    <div class="ots-link-display" id="linkDisplay"></div>

    <div class="ots-passphrase-note hidden" id="passphraseNote">
      The recipient will need the passphrase to view this secret.
    </div>

    <button class="ots-btn ots-btn-primary" id="insertBtn">Insert into Comment</button>
    <button class="ots-btn ots-btn-secondary" id="copyBtn">Copy Link</button>
    <button class="ots-btn ots-btn-secondary" id="newSecretBtn">Create Another</button>
  </div>

  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Onetime Secret – Zendesk Support App
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    (function () {
      'use strict';

      // ── Region map ────────────────────────────────────
      var REGIONS = {
        us: 'us.onetimesecret.com',
        eu: 'eu.onetimesecret.com',
        ca: 'ca.onetimesecret.com',
        uk: 'uk.onetimesecret.com',
        nz: 'nz.onetimesecret.com'
      };

      // ── State ─────────────────────────────────────────
      var client = ZAFClient.init();
      var settings = {};
      var currentShareUrl = '';

      // ── Init ──────────────────────────────────────────
      client.on('app.registered', function () {
        client.get('currentUser.locale').then(function () {
          return client.metadata();
        }).then(function (metadata) {
          settings = metadata.settings || {};
          applySettings();
          resize();
        });
      });

      function applySettings() {
        // Set default TTL from settings if provided
        var defaultTTL = settings.defaultTTL;
        if (defaultTTL) {
          var ttlSelect = document.getElementById('ttlSelect');
          var option = ttlSelect.querySelector('option[value="' + defaultTTL + '"]');
          if (option) {
            ttlSelect.value = defaultTTL;
          }
        }

        // Show region badge
        var region = (settings.region || 'us').toLowerCase();
        var badge = document.getElementById('regionBadge');
        badge.textContent = region.toUpperCase();
        if (settings.customDomain) {
          badge.textContent += ' · ' + settings.customDomain;
        }
      }

      // ── OTS API Client ────────────────────────────────

      function getBaseUrl() {
        var region = (settings.region || 'us').toLowerCase();
        var host = REGIONS[region];
        if (!host) {
          host = REGIONS.us;
        }
        return 'https://' + host;
      }

      function getAuthHeader() {
        var username = settings.apiUsername || '';
        var apiKey = settings.apiKey || '';
        return 'Basic ' + btoa(username + ':' + apiKey);
      }

      /**
       * Create a secret via the OTS v2 API.
       *
       * @param {Object} opts
       * @param {string} opts.secret    - The secret content
       * @param {string} [opts.passphrase] - Optional passphrase
       * @param {number} [opts.ttl]     - TTL in seconds
       * @returns {Promise<Object>}     - The API response
       */
      function concealSecret(opts) {
        var baseUrl = getBaseUrl();
        var url = baseUrl + '/api/v2/secret/conceal';

        var payload = {
          secret: opts.secret,
          ttl: opts.ttl
        };

        // Only include passphrase if explicitly provided
        if (opts.passphrase) {
          payload.passphrase = opts.passphrase;
        }

        // Include custom domain for branded share links
        if (settings.customDomain) {
          payload.share_domain = settings.customDomain;
        }

        return client.request({
          url: url,
          type: 'POST',
          contentType: 'application/json',
          headers: {
            'Authorization': getAuthHeader()
          },
          data: JSON.stringify({ secret: payload }),
          secure: true
        }).then(function (response) {
          // ZAF wraps the response; the actual data may be nested
          var data = response;

          if (!data.success) {
            throw new Error(data.error || 'Secret creation failed');
          }

          // Build the share URL
          // The API returns share_url in the receipt, but we also
          // construct it ourselves to handle custom domains properly.
          var shareUrl = buildShareUrl(data);
          return {
            shareUrl: shareUrl,
            receipt: data.record.receipt,
            hasPassphrase: !!opts.passphrase
          };
        });
      }

      /**
       * Construct the share URL from the API response.
       *
       * The conceal endpoint's receipt.safe_dump does NOT include
       * share_url (that's only added by the ShowReceipt endpoint).
       * So we construct the URL from the secret's identifier, which
       * is the key used in /secret/:key routes. This is different
       * from receipt.identifier which is the receipt's own ID.
       */
      function buildShareUrl(data) {
        var receipt = data.record.receipt || data.record.metadata;

        // If the API ever includes share_url, prefer it
        if (receipt && receipt.share_url) {
          if (settings.customDomain) {
            try {
              var parsed = new URL(receipt.share_url);
              parsed.hostname = settings.customDomain;
              return parsed.toString();
            } catch (e) {
              // Fall through to manual construction
            }
          }
          return receipt.share_url;
        }

        // Build from the secret's identifier (NOT receipt.identifier).
        // The /secret/ route resolves against the secret key.
        var secretKey = data.record.secret ? data.record.secret.identifier : '';
        var host = settings.customDomain || getBaseUrl().replace('https://', '');
        return 'https://' + host + '/secret/' + secretKey;
      }

      // ── UI Handlers ───────────────────────────────────

      var formView = document.getElementById('formView');
      var resultView = document.getElementById('resultView');
      var errorPanel = document.getElementById('errorPanel');
      var generateBtn = document.getElementById('generateBtn');
      var insertBtn = document.getElementById('insertBtn');
      var copyBtn = document.getElementById('copyBtn');
      var newSecretBtn = document.getElementById('newSecretBtn');
      var secretInput = document.getElementById('secretInput');
      var passphraseInput = document.getElementById('passphraseInput');
      var ttlSelect = document.getElementById('ttlSelect');
      var linkDisplay = document.getElementById('linkDisplay');
      var passphraseNote = document.getElementById('passphraseNote');

      generateBtn.addEventListener('click', handleGenerate);
      insertBtn.addEventListener('click', handleInsert);
      copyBtn.addEventListener('click', handleCopy);
      newSecretBtn.addEventListener('click', handleReset);

      function handleGenerate() {
        var secret = secretInput.value.trim();
        if (!secret) {
          showError('Missing content', 'Please enter the content you want to share.');
          return;
        }

        hideError();
        setLoading(true);

        var opts = {
          secret: secret,
          ttl: parseInt(ttlSelect.value, 10)
        };

        var passphrase = passphraseInput.value;
        if (passphrase) {
          opts.passphrase = passphrase;
        }

        concealSecret(opts).then(function (result) {
          currentShareUrl = result.shareUrl;
          linkDisplay.textContent = currentShareUrl;

          if (result.hasPassphrase) {
            passphraseNote.classList.remove('hidden');
          } else {
            passphraseNote.classList.add('hidden');
          }

          formView.style.display = 'none';
          resultView.style.display = 'block';
          resize();
        }).catch(function (err) {
          var msg = 'Could not reach the Onetime Secret API. Check your settings.';
          if (err && err.status === 401) {
            msg = 'Authentication failed. Check your API username and key.';
          } else if (err && err.responseJSON && err.responseJSON.error) {
            msg = err.responseJSON.error;
          } else if (err && err.message) {
            msg = err.message;
          }
          showError('Something went wrong', msg);
        }).finally(function () {
          setLoading(false);
        });
      }

      function handleInsert() {
        if (!currentShareUrl) return;

        // Insert the link into the current ticket comment
        client.invoke('comment.appendText', currentShareUrl);
      }

      function handleCopy() {
        if (!currentShareUrl) return;

        navigator.clipboard.writeText(currentShareUrl).then(function () {
          var original = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(function () {
            copyBtn.textContent = original;
          }, 1500);
        }).catch(function () {
          // Fallback: select the text in the display
          var range = document.createRange();
          range.selectNodeContents(linkDisplay);
          var sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        });
      }

      function handleReset() {
        currentShareUrl = '';
        secretInput.value = '';
        passphraseInput.value = '';
        linkDisplay.textContent = '';
        passphraseNote.classList.add('hidden');
        hideError();

        resultView.style.display = 'none';
        formView.style.display = 'block';
        resize();
      }

      function setLoading(loading) {
        if (loading) {
          generateBtn.disabled = true;
          generateBtn.innerHTML = '<span class="ots-spinner"></span>Encrypting...';
        } else {
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate Link';
        }
      }

      function showError(title, message) {
        document.getElementById('errorTitle').textContent = title;
        document.getElementById('errorMessage').textContent = message;
        errorPanel.style.display = 'block';
        resize();
      }

      function hideError() {
        errorPanel.style.display = 'none';
      }

      function resize() {
        client.invoke('resize', { width: '100%', height: document.body.scrollHeight + 16 + 'px' });
      }
    })();
  </script>
</body>
</html>
